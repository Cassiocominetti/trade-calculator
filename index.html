<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora de Trade Viver de Cripto</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="TradeIcon.png" type="image/png" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>CALCULADORA DE TRADE<br />VIVER DE CRIPTO</h1>
        <button id="toggle-theme" title="Alternar tema">🌙</button>
      </div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="calculadora">
          Calculadora
        </button>
        <button class="tab-btn" data-tab="historico">Histórico</button>
      </div>

      <div class="tab-content active" id="calculadora">
        <form id="calc-form">
          <label for="loss">Perda máxima (US$)</label>
          <select id="loss">
            <option value="50">50</option>
            <option value="100">100</option>
            <option value="200">200</option>
            <option value="300">300</option>
            <option value="400">400</option>
            <option value="500" selected>500</option>
          </select>

          <label for="stop">Stop (%)</label>
          <input
            id="stop"
            placeholder="0.00"
            type="number"
            step="0.01"
            required
          />

          <label for="leverage">Alavancagem</label>
          <input
            id="leverage"
            placeholder="0"
            type="number"
            step="1"
            required
          />

          <button type="submit">Calcular</button>
        </form>

        <div class="results" id="results" style="display: none">
          <p>
            <strong>Perda Máxima:</strong> US$ <span id="loss-display"></span>
          </p>
          <p>
            <strong>Tamanho da Posição:</strong>
            <span id="position-size"></span>
          </p>
          <p>
            <strong>Margem Utilizada:</strong>
            <span id="margin-required"></span>
          </p>
        </div>

        <div class="disclaimer">
          ⚠️ <strong>Aviso Legal:</strong> Os cálculos apresentados são apenas
          <strong>estimativas</strong> e não constituem recomendação de
          investimento. Considere sempre o
          <strong>preço de liquidação</strong> e as
          <strong>taxas da corretora</strong>.
        </div>
      </div>

      <div class="tab-content" id="historico">
        <ul id="history-list"></ul>
        <div class="buttons">
          <button id="clear-history">🗑️ Apagar Histórico</button>
          <button id="export-xlsx">📊 Exportar Excel</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
