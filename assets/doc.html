<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Documentação - Calculadora de Trade Viver de Cripto</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-light.min.css"
      rel="stylesheet"
      media="(prefers-color-scheme: light)"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-dark.min.css"
      rel="stylesheet"
      media="(prefers-color-scheme: dark)"
    />

    <style>
      body {
        background-color: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin: 40px auto;
        max-width: 900px;
        padding: 0 20px;
        transition: background-color 0.3s, color 0.3s;
      }

      .markdown-body {
        background: var(--card);
        padding: 40px;
        border-radius: 8px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
        transition: background 0.3s;
      }

      a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }
      a:hover {
        text-decoration: underline;
      }

      :root {
        --bg: #e5dfd6;
        --text: #1c1c1c;
        --card: #444444;
        --accent: #c79200;
      }

      body.dark {
        --bg: #121212;
        --text: #e1e1e1;
        --card: #1e1e1e;
        --accent: #f5c443;
      }

      h1::before,
      h2::before,
      h3::before {
        display: inline-block;
        margin-right: 8px;
        user-select: none;
      }

      h1::before {
        content: "";
        display: inline-block;
        width: 1.5em;
        height: 1.5em;
        background-image: url("./TradeIcon.png"); /* caminho do seu PNG */
        background-size: contain;
        background-repeat: no-repeat;
        margin-right: 8px;
        margin-bottom: 7px;
        vertical-align: middle;
      }

      h2::before {
        content: "+";
        font-size: 1em;
      }

      h3::before {
        content: "🔗";
        font-size: 0.9em;
      }

      ::-webkit-scrollbar {
        width: 10px;
      }

      ::-webkit-scrollbar-thumb {
        background-color: #444343;
        border-radius: 10px;
      }

      ::-webkit-scrollbar-track {
        background: var(--card);
      }
    </style>
  </head>

  <body>
    <article class="markdown-body" id="content" aria-live="polite">
      Carregando documentação...
    </article>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      (function () {
        const prefersDark = window.matchMedia(
          "(prefers-color-scheme: dark)"
        ).matches;
        const savedTheme = localStorage.getItem("theme");
        const darkMode = savedTheme === "dark" || (!savedTheme && prefersDark);
        if (darkMode) document.body.classList.add("dark");
      })();

      fetch("doc.md")
        .then((res) => {
          if (!res.ok)
            throw new Error("Erro ao carregar o arquivo DOCUMENTACAO.md");
          return res.text();
        })
        .then((md) => {
          document.getElementById("content").innerHTML = marked.parse(md);
        })
        .catch((err) => {
          document.getElementById("content").textContent = err.message;
        });
    </script>
  </body>
</html>
